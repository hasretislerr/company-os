<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personel Aktivite Takip Paneli</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & Tokens ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0f1117;
      --surface:     #1a1d27;
      --surface2:    #242736;
      --border:      #2e3147;
      --accent:      #6c63ff;
      --accent-soft: rgba(108,99,255,.15);
      --text:        #e8eaf0;
      --muted:       #7b82a0;
      --active:      #3b82f6;   /* Mavi  — klavye/mouse */
      --audio:       #f59e0b;   /* Sarı  — ses/toplantı */
      --idle:        #2e3147;   /* Gri   — boşta       */
      --active-glow: rgba(59,130,246,.35);
      --audio-glow:  rgba(245,158,11,.35);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── Header ─────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    header h1 { font-size: 17px; font-weight: 600; }
    header p  { font-size: 12px; color: var(--muted); margin-top: 1px; }

    .header-right {
      margin-left: auto;
      display: flex; align-items: center; gap: 12px;
    }
    .date-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 12px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
    }
    .refresh-badge {
      font-size: 11px;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 5px 10px;
      border-radius: 6px;
    }
    .refresh-badge span { color: #34d399; }

    /* ─── Legend ──────────────────────────────────────── */
    .legend {
      display: flex; gap: 20px; align-items: center;
      padding: 10px 32px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted); }
    .legend-dot  { width: 12px; height: 12px; border-radius: 3px; }

    /* ─── Main Layout ─────────────────────────────────── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 220px 1fr;
    }

    /* ─── Sidebar ─────────────────────────────────────── */
    aside {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 16px 0;
    }
    aside h2 {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 16px 12px;
    }
    .employee-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px;
      cursor: pointer;
      transition: background .15s;
      position: relative;
    }
    .employee-item:hover   { background: var(--surface2); }
    .employee-item.active  { background: var(--accent-soft); }
    .employee-item.active::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: var(--accent); border-radius: 0 2px 2px 0;
    }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600; color: #fff; flex-shrink: 0;
    }
    .employee-name { font-size: 13px; font-weight: 500; }
    .employee-id   { font-size: 10px; color: var(--muted); margin-top: 1px; }

    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      margin-left: auto; flex-shrink: 0;
    }
    .status-dot.active { background: var(--active); box-shadow: 0 0 6px var(--active-glow); }
    .status-dot.audio  { background: var(--audio);  box-shadow: 0 0 6px var(--audio-glow);  }
    .status-dot.idle   { background: var(--idle); border: 1px solid var(--border); }

    /* ─── Timeline Panel ──────────────────────────────── */
    #timeline-panel {
      padding: 24px 32px;
      overflow-y: auto;
    }

    .panel-header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 24px;
    }
    .panel-header h3 { font-size: 18px; font-weight: 600; }
    .panel-header .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ─── Time Axis ───────────────────────────────────── */
    .time-axis {
      display: flex; margin-bottom: 6px;
      padding-left: 0;
    }
    .time-label {
      flex: 1;
      font-size: 10px;
      color: var(--muted);
      text-align: center;
    }

    /* ─── Timeline Strip ──────────────────────────────── */
    .timeline-container {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 20px 16px;
      overflow: hidden;
    }
    .timeline-track {
      position: relative;
      height: 40px;
      background: var(--idle);
      border-radius: 6px;
      overflow: hidden;
    }
    .timeline-block {
      position: absolute;
      top: 0; bottom: 0;
      border-radius: 4px;
      cursor: pointer;
      transition: filter .15s, transform .15s;
    }
    .timeline-block:hover {
      filter: brightness(1.3);
      transform: scaleY(1.08);
      z-index: 10;
    }
    .timeline-block.active  { background: var(--active); box-shadow: 0 0 8px var(--active-glow); }
    .timeline-block.audio   { background: var(--audio);  box-shadow: 0 0 8px var(--audio-glow);  }

    /* Saat çizgileri */
    .hour-lines {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
    }
    .hour-line {
      position: absolute;
      top: 0; bottom: 0;
      width: 1px;
      background: rgba(255,255,255,.05);
    }

    /* ─── Stats Row ───────────────────────────────────── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 20px;
    }
    .stat-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
    }
    .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .stat-value { font-size: 22px; font-weight: 700; }
    .stat-value.blue   { color: var(--active); }
    .stat-value.yellow { color: var(--audio); }
    .stat-value.gray   { color: #7b82a0; }

    /* ─── Activity Log Table ──────────────────────────── */
    .log-section { margin-top: 28px; }
    .log-section h4 {
      font-size: 13px; font-weight: 600;
      color: var(--muted); margin-bottom: 12px;
      text-transform: uppercase; letter-spacing: .06em;
    }
    .log-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .log-table th {
      text-align: left;
      padding: 8px 12px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      font-weight: 500;
    }
    .log-table td {
      padding: 9px 12px;
      border-bottom: 1px solid rgba(46,49,71,.5);
      color: var(--text);
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .log-table tr:hover td { background: var(--surface2); }
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500;
    }
    .badge.active { background: rgba(59,130,246,.2);  color: #93c5fd; }
    .badge.audio  { background: rgba(245,158,11,.2);  color: #fcd34d; }
    .badge.idle   { background: rgba(100,116,139,.2); color: #94a3b8; }
    .badge-dot    { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

    /* ─── Empty / Loading States ──────────────────────── */
    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--muted);
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p     { font-size: 13px; }

    /* ─── Tooltip ─────────────────────────────────────── */
    #tooltip {
      position: fixed;
      background: #1e2130;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      pointer-events: none;
      z-index: 9999;
      max-width: 280px;
      display: none;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
    }
    #tooltip .tt-app   { font-weight: 600; color: var(--text); margin-bottom: 3px; }
    #tooltip .tt-title { color: var(--muted); }
    #tooltip .tt-time  { color: var(--accent); font-size: 11px; margin-top: 5px; }

    /* ─── Responsive ──────────────────────────────────── */
    @media (max-width: 768px) {
      main { grid-template-columns: 1fr; }
      aside { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">📊</div>
  <div>
    <h1>Aktivite Takip Paneli</h1>
    <p>Personel zaman çizelgesi — Müdür Görünümü</p>
  </div>
  <div class="header-right">
    <input type="date" id="dateInput" class="date-input" />
    <div class="refresh-badge">Oto-yenileme: <span id="countdown">60</span>s</div>
  </div>
</header>

<!-- Legend -->
<div class="legend">
  <div class="legend-item">
    <div class="legend-dot" style="background:var(--active)"></div>
    Klavye / Mouse Aktif
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:var(--audio)"></div>
    Ses / Toplantı (Mikrofon veya Hoparlör)
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:var(--border); border:1px solid #555"></div>
    Boşta
  </div>
</div>

<main>
  <!-- Personel Listesi -->
  <aside>
    <h2>Personel</h2>
    <div id="employeeList">
      <div class="empty-state"><div class="icon">⌛</div><p>Yükleniyor…</p></div>
    </div>
  </aside>

  <!-- Zaman Çizelgesi Paneli -->
  <div id="timeline-panel">
    <div class="empty-state">
      <div class="icon">👈</div>
      <p>Soldan bir personel seçin</p>
    </div>
  </div>
</main>

<!-- Tooltip -->
<div id="tooltip">
  <div class="tt-app" id="ttApp">—</div>
  <div class="tt-title" id="ttTitle">—</div>
  <div class="tt-time" id="ttTime">—</div>
</div>

<script>
  // ─── Config ───────────────────────────────────────────
  const API = 'http://localhost:3099';
  const REFRESH_INTERVAL = 60; // saniye

  // ─── State ────────────────────────────────────────────
  let selectedEmployeeId = null;
  let selectedEmployeeName = '';
  let employees = [];
  let allLogs = [];
  let countdown = REFRESH_INTERVAL;
  let refreshTimer = null;
  let countdownTimer = null;

  // ─── Yardımcılar ──────────────────────────────────────
  function getSelectedDate() {
    return document.getElementById('dateInput').value;
  }

  function timeToPercent(isoStr) {
    const d = new Date(isoStr);
    const minutes = d.getHours() * 60 + d.getMinutes();
    return (minutes / (24 * 60)) * 100;
  }

  function formatTime(isoStr) {
    return new Date(isoStr).toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
  }

  function formatDuration(minutes) {
    const h = Math.floor(minutes / 60);
    const m = minutes % 60;
    if (h === 0) return `${m} dk`;
    return `${h} sa ${m} dk`;
  }

  function initials(name) {
    return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  }

  // ─── Tooltip ──────────────────────────────────────────
  const tooltip = document.getElementById('tooltip');

  function showTooltip(e, log) {
    document.getElementById('ttApp').textContent   = log.app_name    || 'Bilinmeyen Uygulama';
    document.getElementById('ttTitle').textContent = log.window_title || '—';
    document.getElementById('ttTime').textContent  = formatTime(log.timestamp);
    tooltip.style.display = 'block';
    moveTooltip(e);
  }

  function moveTooltip(e) {
    const x = e.clientX + 14;
    const y = e.clientY - 10;
    const tw = tooltip.offsetWidth;
    const left = x + tw > window.innerWidth ? e.clientX - tw - 14 : x;
    tooltip.style.left = left + 'px';
    tooltip.style.top  = y + 'px';
  }

  function hideTooltip() { tooltip.style.display = 'none'; }
  document.addEventListener('mousemove', e => {
    if (tooltip.style.display === 'block') moveTooltip(e);
  });

  // ─── Personel Listesi ──────────────────────────────────
  async function loadEmployees() {
    try {
      const res = await fetch(`${API}/api/employees`);
      employees = await res.json();
      renderEmployeeList();
    } catch {
      document.getElementById('employeeList').innerHTML =
        '<div class="empty-state"><div class="icon">⚠️</div><p>Sunucuya bağlanılamadı.<br/>Sunucunun çalıştığından emin olun.</p></div>';
    }
  }

  function renderEmployeeList() {
    const list = document.getElementById('employeeList');
    if (!employees.length) {
      list.innerHTML = '<div class="empty-state"><div class="icon">👤</div><p>Kayıtlı personel yok</p></div>';
      return;
    }
    list.innerHTML = employees.map(emp => {
      const lastLog = allLogs.filter(l => l.employee_id === emp.id).slice(-1)[0];
      const dotClass = lastLog ? lastLog.status : 'idle';
      const isActive = emp.id === selectedEmployeeId ? 'active' : '';
      return `
        <div class="employee-item ${isActive}" onclick="selectEmployee('${emp.id}', '${emp.name.replace(/'/g,"\\'")}')">
          <div class="avatar">${initials(emp.name)}</div>
          <div>
            <div class="employee-name">${emp.name}</div>
            <div class="employee-id">${emp.id}</div>
          </div>
          <div class="status-dot ${dotClass}"></div>
        </div>`;
    }).join('');
  }

  // ─── Personel Seç ─────────────────────────────────────
  function selectEmployee(id, name) {
    selectedEmployeeId = id;
    selectedEmployeeName = name;
    renderEmployeeList();
    loadTimeline();
  }

  // ─── Timeline Yükle ───────────────────────────────────
  async function loadTimeline() {
    if (!selectedEmployeeId) return;
    const date = getSelectedDate();

    try {
      const res = await fetch(`${API}/api/activity/${selectedEmployeeId}?date=${date}`);
      const data = await res.json();
      allLogs = data.logs || [];
      renderTimeline(allLogs);
    } catch {
      document.getElementById('timeline-panel').innerHTML =
        '<div class="empty-state"><div class="icon">⚠️</div><p>Veri alınamadı.</p></div>';
    }
  }

  // ─── Timeline Render ───────────────────────────────────
  function renderTimeline(logs) {
    const panel = document.getElementById('timeline-panel');

    // İstatistikler
    const activeLogs = logs.filter(l => l.status === 'active');
    const audioLogs  = logs.filter(l => l.status === 'audio');
    const idleLogs   = logs.filter(l => l.status === 'idle');

    // Saat eksenindeki etiketler (her 2 saatte bir)
    const hourLabels = Array.from({length: 13}, (_, i) => {
      const h = i * 2;
      return `<div class="time-label">${String(h).padStart(2,'0')}:00</div>`;
    }).join('');

    // Zaman çizelgesi blokları
    const blocks = logs.map(log => {
      if (log.status === 'idle') return '';
      const left  = timeToPercent(log.timestamp);
      const width = Math.max(0.3, (1 / (24 * 60)) * 100); // 1 dakika genişlik
      return `
        <div class="timeline-block ${log.status}"
             style="left:${left.toFixed(2)}%;width:${width.toFixed(2)}%"
             onmouseenter="showTooltip(event,${JSON.stringify(log).replace(/"/g,'&quot;')})"
             onmouseleave="hideTooltip()">
        </div>`;
    }).join('');

    // Saat çizgileri
    const hourLines = Array.from({length: 25}, (_, i) =>
      `<div class="hour-line" style="left:${(i/24*100).toFixed(2)}%"></div>`
    ).join('');

    // Log tablosu (son 50 kayıt)
    const recentLogs = [...logs].reverse().slice(0, 50);
    const tableRows = recentLogs.map(log => `
      <tr>
        <td>${formatTime(log.timestamp)}</td>
        <td><span class="badge ${log.status}"><span class="badge-dot"></span>${
          log.status === 'active' ? 'Aktif' :
          log.status === 'audio'  ? 'Toplantı' : 'Boşta'
        }</span></td>
        <td title="${log.app_name || ''}">${log.app_name || '—'}</td>
        <td title="${log.window_title || ''}">${log.window_title?.slice(0,60) || '—'}</td>
        <td>${log.audio_status || '—'}</td>
      </tr>
    `).join('');

    panel.innerHTML = `
      <div class="panel-header">
        <div>
          <h3>${selectedEmployeeName}</h3>
          <div class="sub">${getSelectedDate()} · ${logs.length} kayıt</div>
        </div>
      </div>

      <!-- Saat Ekseni -->
      <div class="time-axis">${hourLabels}</div>

      <!-- Şerit -->
      <div class="timeline-container">
        <div class="timeline-track">
          <div class="hour-lines">${hourLines}</div>
          ${blocks || '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted)">Bu tarih için kayıt yok</div>'}
        </div>
      </div>

      <!-- İstatistikler -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">⌨️ Aktif Süre</div>
          <div class="stat-value blue">${activeLogs.length} dk</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">🎙️ Toplantı / Ses</div>
          <div class="stat-value yellow">${audioLogs.length} dk</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">💤 Boşta</div>
          <div class="stat-value gray">${idleLogs.length} dk</div>
        </div>
      </div>

      <!-- Detay Tablosu -->
      <div class="log-section">
        <h4>Kronolojik Kayıtlar (Son ${recentLogs.length})</h4>
        ${recentLogs.length === 0
          ? '<div class="empty-state"><div class="icon">📭</div><p>Bu tarih için kayıt bulunamadı.<br/>Ajanın çalıştığından emin olun.</p></div>'
          : `<table class="log-table">
              <thead>
                <tr>
                  <th>Saat</th><th>Durum</th><th>Uygulama</th>
                  <th>Pencere Başlığı</th><th>Ses Durumu</th>
                </tr>
              </thead>
              <tbody>${tableRows}</tbody>
            </table>`
        }
      </div>
    `;
  }

  // ─── Otomatik Yenileme ────────────────────────────────
  function startAutoRefresh() {
    countdown = REFRESH_INTERVAL;
    if (refreshTimer)  clearInterval(refreshTimer);
    if (countdownTimer) clearInterval(countdownTimer);

    refreshTimer = setInterval(() => {
      loadTimeline();
    }, REFRESH_INTERVAL * 1000);

    countdownTimer = setInterval(() => {
      countdown--;
      document.getElementById('countdown').textContent = countdown;
      if (countdown <= 0) countdown = REFRESH_INTERVAL;
    }, 1000);
  }

  // ─── Tarih Değişimi ───────────────────────────────────
  document.getElementById('dateInput').addEventListener('change', () => {
    if (selectedEmployeeId) loadTimeline();
  });

  // ─── Init ─────────────────────────────────────────────
  (function init() {
    const today = new Date().toISOString().slice(0, 10);
    document.getElementById('dateInput').value = today;
    loadEmployees();
    startAutoRefresh();
  })();
</script>
</body>
</html>
